[project]
name = "roletone"
version = "0.1.0"
description = "WavLM-based speaker/timbre similarity scoring service for cloned TTS audio."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.136.1",
    "librosa>=0.11.0",
    "python-dotenv>=1.2.2",
    "python-multipart>=0.0.29",
    "soundfile>=0.13.1",
    "torch>=2.12.0",
    "torchaudio>=2.11.0",
    "transformers>=5.9.0",
    "uvicorn[standard]>=0.47.0",
]

[project.scripts]
roletone = "roletone.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/roletone"]
